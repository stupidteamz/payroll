databases:
  - name: payroll-db
    databaseName: payroll
    user: payroll_user
    plan: free

services:
  - type: web
    name: payroll-backend
    runtime: node
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payroll-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ADMIN_USER
        value: "admin"
      - key: ADMIN_PASS
        value: "payroll2026"
      - key: JWT_SECRET
        value: "super_secret_payroll_key_2026"

  - type: web
    name: payroll-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://payroll-backend.onrender.com"
