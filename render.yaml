databases:
  - name: payroll-db
    databaseName: payroll
    user: payroll_user
    plan: free

services:
  - type: web
    name: payroll-backend
    runtime: node
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: payroll-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generate: true

  - type: web
    name: payroll-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: payroll-backend
          property: url
